name: Sync HBUT Timetable ICS

on:
  schedule:
    # Monday + Thursday 07:00 Asia/Shanghai == Sunday + Wednesday 23:00 UTC
    - cron: "0 23 * * 0,3"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: hbut-timetable-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run sync
        env:
          HBUT_COOKIE: ${{ secrets.HBUT_COOKIE }}
          ICS_TOKEN: ${{ secrets.ICS_TOKEN }}
        run: |
          hbut-sync --repo-root . --skip-meta

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = `Timetable sync failed: ${new Date().toISOString()}`;
            const body = [
              '自动课表同步失败，请检查：',
              '1. HBUT_COOKIE 是否过期',
              '2. 课表接口返回结构是否变化',
              '3. GitHub Actions 日志报错详情'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
