name: Validate HBUT Cookie

on:
  schedule:
    # Daily 06:30 Asia/Shanghai == previous day 22:30 UTC
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-cookie:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Validate cookie
        env:
          HBUT_COOKIE: ${{ secrets.HBUT_COOKIE }}
        run: |
          hbut-check-cookie --repo-root .
